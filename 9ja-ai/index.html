<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>9JA AI - Naija's Smartest AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="chat-container">
    <header>
      <div class="logo">
        <i class="fas fa-robot"></i>
        <h1>9JA AI</h1>
      </div>
      <p>Oya, wetin you wan know today? 🇳🇬</p>
      
      <div class="header-controls">
        <button id="newChatBtn" title="New Chat"><i class="fas fa-plus"></i></button>
        <button id="darkModeBtn" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
      </div>
    </header>

    <div class="chat-box" id="chatBox">
      <div class="message incoming">
        <strong>9JA AI:</strong> How far bros! I be your personal 9JA AI powered by Groq. Ask me anything — from perfect Jollof to business ideas or life advice.
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <button onclick="sendSuggestion(this)">Best Jollof recipe</button>
      <button onclick="sendSuggestion(this)">Business ideas for Lagos</button>
      <button onclick="sendSuggestion(this)">Tech career in Naija</button>
      <button onclick="sendSuggestion(this)">Tell me funny Naija joke</button>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="Type your message... (e.g. Wetin dey happen?)" rows="1"></textarea>
      <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
