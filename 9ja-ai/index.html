<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>9JA AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="app">
    <header>
      <button id="menuBtn" class="icon-btn"><i class="fas fa-bars"></i></button>
      <div class="logo">
        <span class="flag">🇳🇬</span>
        <span>9JA AI</span>
      </div>
      <button id="newChatBtn" class="icon-btn"><i class="fas fa-plus"></i></button>
    </header>

    <div class="chat-box" id="chatBox"></div>

    <div class="suggestions" id="suggestions">
      <button onclick="sendSuggestion(this)">Best Jollof recipe</button>
      <button onclick="sendSuggestion(this)">Business ideas in Lagos</button>
      <button onclick="sendSuggestion(this)">Tech opportunities in Naija</button>
      <button onclick="sendSuggestion(this)">Tell me a joke</button>
    </div>

    <div class="input-area">
      <button id="voiceInputBtn" class="icon-btn"><i class="fas fa-microphone"></i></button>
      <button id="cameraBtn" class="icon-btn"><i class="fas fa-camera"></i></button>
      <textarea id="userInput" placeholder="Ask anything..." rows="1"></textarea>
      <button id="sendBtn" class="icon-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <!-- Side Menu -->
  <div id="sideMenu" class="side-menu">
    <button id="closeMenu" class="close-btn">✕</button>
    <h3>Previous Chats</h3>
    <div id="previousChats"></div>
    
    <div style="margin-top:30px;">
      <button onclick="newChat()" style="width:100%; padding:12px; background:#00cc88; color:black; border:none; border-radius:12px;">
        New Chat
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
