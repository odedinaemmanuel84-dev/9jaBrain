<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>9JA AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <button id="menuBtn" class="icon-btn"><i class="fas fa-bars"></i></button>
        <div class="logo">
          <span class="flag">🇳🇬</span>
          <span>9JA AI</span>
        </div>
      </div>
      <button id="newChatBtn" class="icon-btn" title="New Chat"><i class="fas fa-plus"></i></button>
    </header>

    <div class="chat-box" id="chatBox"></div>

    <!-- Suggestions - only show when chat is empty -->
    <div class="suggestions" id="suggestions">
      <button onclick="sendSuggestion(this)">Best Jollof recipe</button>
      <button onclick="sendSuggestion(this)">Business ideas in Lagos</button>
      <button onclick="sendSuggestion(this)">Tech opportunities in Naija</button>
      <button onclick="sendSuggestion(this)">Tell me a joke</button>
    </div>

    <div class="input-area">
      <button id="voiceInputBtn" class="icon-btn" title="Voice Input"><i class="fas fa-microphone"></i></button>
      <button id="cameraBtn" class="icon-btn" title="Upload Image"><i class="fas fa-camera"></i></button>
      <input type="file" id="imageUpload" accept="image/*" style="display:none">
      <textarea id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
      <button id="sendBtn" class="icon-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <!-- Side Menu -->
  <div id="sideMenu" class="side-menu">
    <button id="closeMenu" class="close-btn">✕</button>
    <ul>
      <li onclick="newChat()">New Chat</li>
      <li onclick="clearAllHistory()">Clear History</li>
    </ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
