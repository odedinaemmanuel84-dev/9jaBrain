<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>9JA AI - Naija's Smartest AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="chat-container">
    <header>
      <div class="logo">
        <i class="fas fa-robot"></i>
        <h1>9JA AI</h1>
      </div>
      <p>Oya, wetin you wan know today? 🇳🇬</p>
    </header>

    <div class="chat-box" id="chatBox"></div>

    <div class="suggestions">
      <p class="suggestions-title">Quick questions:</p>
      <div class="suggestion-buttons" id="suggestionButtons"></div>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="Type your message... e.g. 'How to make good jollof?'" rows="1"></textarea>
      <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
