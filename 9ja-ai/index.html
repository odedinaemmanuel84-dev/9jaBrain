<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naija AI | Fast. Free. Local.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <header>
            <div class="logo">
                <span class="flag">🇳🇬</span>
                <div class="title-stack">
                    <h1>Naija AI</h1>
                    <p class="subtitle">Whisper & Gemini 1.5</p>
                </div>
            </div>
            <span class="status-dot"></span>
        </header>

        <!-- The Glowing Container -->
        <div class="chat-glow-container">
            <div id="chat-box" class="chat-box">
                <!-- Welcome Message -->
                <div class="msg ai">
                    Howfar? I be Naija AI. Toss me a question, a photo, or a voice note, and I'm ready to help you.
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="action-buttons">
                <input type="file" id="image-input" accept="image/*" hidden>
                <button class="icon-btn" onclick="document.getElementById('image-input').click()" title="Upload Image">
                    📷
                </button>
                <button class="icon-btn" id="mic-btn" title="Record Voice">
                    🎤
                </button>
            </div>
            <input type="text" id="user-input" placeholder="Wetin dey sup? Ask me...">
            <button id="send-btn" class="send-btn">
                Send
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
