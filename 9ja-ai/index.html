<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naija AI | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="nav-left">
                <button id="menuBtn" class="icon-btn"><i class="fas fa-bars"></i></button>
                <span class="logo-brand">Naija AI</span>
            </div>
            <div class="nav-right">
                <button id="newChatBtn" class="icon-btn"><i class="far fa-edit"></i></button>
                <div class="profile-area"><img id="userImg" src="default-avatar.png" class="user-avatar"></div>
            </div>
        </header>

        <main id="chatDisplay" class="chat-content">
            <!-- Personalized Welcome Screen -->
            <div class="welcome-section" id="welcomeUI">
                <h2 id="welcomeGreeting">Oga, I dey listen. Wetin you want make we gist about today?</h2>
                <div class="suggestion-grid">
                    <div class="suggest-card" onclick="setPrompt('Tell me a Nigerian joke')"><i class="fas fa-laugh"></i><p>Joke</p></div>
                    <div class="suggest-card" onclick="setPrompt('How to cook Jollof?')"><i class="fas fa-utensils"></i><p>Cooking</p></div>
                    <div class="suggest-card" onclick="setPrompt('Wetin dey sup?')"><i class="fas fa-comment"></i><p>Gist</p></div>
                </div>
            </div>
        </main>

        <footer class="input-section">
            <div class="rainbow-border-box">
                <div class="input-container">
                    <label for="imageUpload" class="action-btn">
                        <i class="fas fa-paperclip"></i>
                        <input type="file" id="imageUpload" hidden accept="image/*">
                    </label>
                    <input type="text" id="userInput" placeholder="Ask anything...">
                    <div class="input-actions">
                        <button id="voiceBtn" class="speak-btn"><i class="fas fa-microphone"></i> <span>Speak</span></button>
                        <button id="sendBtn" class="send-btn" style="display:none;"><i class="fas fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
            <p class="bot-disclaimer">Naija AI fit make mistakes. Check your gist well.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
