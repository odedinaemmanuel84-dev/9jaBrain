<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naija AI | Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <!-- Faded Moving Background Images -->
    <div class="bg-slider">
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1677442136019-21780ecad995');"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1614741118887-7a4ee193a5fa');"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1620712943543-bcc4688e7485');"></div>
    </div>

    <div class="auth-container">
        <h1 class="logo-text">Naija AI</h1>
        <div id="authForm" class="auth-card">
            <h2 id="authTitle">Login</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button id="authBtn">Enter Gist</button>
            <p id="toggleAuth">No get account? <b>Register here</b></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
