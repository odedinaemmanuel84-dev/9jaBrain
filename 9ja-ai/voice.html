<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naija AI | Voice Mode</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="voice-body">
    <div class="voice-container">
        <header class="voice-header">
            <button onclick="window.location.href='index.html'" class="icon-btn">
                <i class="fas fa-times"></i>
            </button>
            <span class="voice-status" id="statusText">Ready to gist...</span>
        </header>

        <main class="voice-main">
            <!-- Personalized Greeting -->
            <h1 id="voiceGreeting">Oga, I dey listen...</h1>
            
            <!-- Animated Pulse Circle -->
            <div class="pulse-wrapper" id="pulseContainer">
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="pulse-circle">
                    <i class="fas fa-microphone"></i>
                </div>
            </div>

            <div class="transcript-area">
                <p id="userSpeech">...</p>
            </div>
        </main>

        <footer class="voice-footer">
            <button id="toggleMic" class="mic-main-btn">
                <i class="fas fa-microphone"></i>
            </button>
            <p>Tap to talk or listen</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="voice.js"></script>
</body>
</html>
